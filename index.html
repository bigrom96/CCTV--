<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>VisionProtect Pro — Спецификация оборудования</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ... (стили остаются без изменений) ... */
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1f2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --danger: #ff3b5c;
    --success: #00e5a0;
    --text: #e2e8f0;
    --text-muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(255,107,53,0.06) 0%, transparent 50%);
  }
  header {
    background: rgba(17,24,39,0.97);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
    padding: 12px 16px;
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 600px; margin: 0 auto;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700;
    letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #006d84, #00a8c8);
    border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .logo span { color: var(--accent); }
  .tech-toggle {
    display: flex; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; padding: 4px; gap: 4px;
  }
  .tech-btn {
    padding: 9px 18px; border-radius: 9px; border: none;
    font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    min-width: 74px; background: transparent; color: var(--text-muted);
  }
  .tech-btn.ip.active { background: linear-gradient(135deg, #0a3d52, #0d5068); color: var(--accent); box-shadow: 0 0 16px rgba(0,212,255,0.25); }
  .tech-btn.hdcvi.active { background: linear-gradient(135deg, #4a1f0a, #5c2a0d); color: var(--accent2); box-shadow: 0 0 16px rgba(255,107,53,0.25); }

  .main { max-width: 600px; margin: 0 auto; padding: 14px 14px 130px; }

  .tech-indicator {
    display: flex; align-items: center; gap: 7px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 6px 12px 6px 8px; border-radius: 20px; margin-bottom: 14px; width: fit-content;
  }
  .tech-indicator.ip { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--accent); }
  .tech-indicator.hdcvi { background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2); color: var(--accent2); }
  .tech-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; }
  .ip .tech-dot { background: var(--accent); }
  .hdcvi .tech-dot { background: var(--accent2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .project-bar {
    background: var(--surface2);
    border-radius: 20px;
    margin-bottom: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    border: 1px solid var(--border);
  }
  .project-name {
    flex: 1;
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .project-btn {
    background: rgba(100,116,139,0.2);
    border: none;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
  }
  .quick-cam {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,212,255,0.05);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .cam-counter {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }
  .cam-counter button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 40px;
    height: 40px;
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    cursor: pointer;
  }
  .cam-counter input {
    width: 60px;
    text-align: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .notes-area {
    background: var(--surface2);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .notes-area textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: vertical;
  }
  .template-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .template-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
  }
  .section {
    margin-bottom: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .section-icon { font-size: 17px; width: 28px; text-align: center; }
  .section-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; flex: 1; }
  .section-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(100,116,139,0.2);
    color: var(--text-muted);
  }
  .section-badge.has-items { background: rgba(0,229,160,0.15); color: var(--success); }
  .section-chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 11px; }
  .section-chevron.open { transform: rotate(180deg); }

  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid rgba(31,45,69,0.5);
    flex-wrap: wrap;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row.warning { border-left: 3px solid var(--danger); background: rgba(255,59,92,0.04); padding-left: 11px; }
  .item-row.warning .item-name { color: #ff8fa3; }

  .item-row-main {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .item-row-sub {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding-left: 40px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .sub-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .pill-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .pill-btn {
    padding: 5px 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
  }
  .pill-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; }
  .pill-btn:first-child { border-right: 1px solid var(--border); }

  .check-wrap { position: relative; flex-shrink: 0; }
  .check-wrap input[type="checkbox"] { position: absolute; opacity: 0; width: 30px; height: 30px; cursor: pointer; z-index: 2; margin: 0; }
  .check-box {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .check-wrap input:checked + .check-box { background: var(--success); border-color: var(--success); }
  .check-mark { color: #000; font-size: 15px; font-weight: bold; opacity: 0; }
  .check-wrap input:checked + .check-box .check-mark { opacity: 1; }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .item-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  select, input[type="number"], input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 8px;
    outline: none;
  }
  .qty-input { width: 58px; text-align: center; }
  .spec-select { flex-shrink: 0; }
  .warn-badge { font-size: 15px; flex-shrink: 0; align-self: center; cursor: pointer; }

  .sub-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px 7px 44px;
    background: rgba(0,212,255,0.03);
    font-size: 13px;
    color: var(--text-muted);
  }
  .clips-tag {
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--accent);
  }

  .add-custom { padding: 10px 14px; background: var(--surface2); border-top: 1px solid var(--border); }
  .add-row { display: flex; gap: 8px; align-items: center; }
  .add-row input[type="text"] { flex: 1; }
  .btn-add {
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.08));
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-del {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 17px;
  }
  .custom-name-input {
    width: 100%;
    background: transparent !important;
    border: none !important;
    border-bottom: 1px solid var(--border) !important;
    border-radius: 0 !important;
    padding: 2px 0 !important;
    font-size: 14px;
    color: var(--text) !important;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,14,23,0.97);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px);
    padding: 10px 14px 16px;
    z-index: 100;
  }
  .bottom-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }
  .btn-export {
    flex: 1;
    background: linear-gradient(135deg, #006d84, #00a8c8);
    border: none;
    color: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-clear {
    background: rgba(255,59,92,0.1);
    border: 1px solid rgba(255,59,92,0.3);
    color: var(--danger);
    border-radius: 12px;
    padding: 14px 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .stats-bar {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 5px 0 0;
  }

  .toast {
    position: fixed;
    top: 68px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--success);
    color: #000;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: 700;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 600px;
  }
  .modal h3 { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--danger); margin-bottom: 8px; }
  .modal p { color: var(--text-muted); margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-confirm-clear { background: var(--danger); color: #fff; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border) !important; color: var(--text); }
  .project-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    color: var(--text);
    width: 100%;
  }
</style>
</head>
<body>

<div id="toast" class="toast">✓ Скопировано</div>
<div id="modal" class="modal-overlay" style="display:none"></div>

<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-icon">📷</div>Vision<span>Protect</span></div>
    <div class="tech-toggle">
      <button class="tech-btn ip" id="btn-ip">IP</button>
      <button class="tech-btn hdcvi" id="btn-hdcvi">HDCVI</button>
    </div>
  </div>
</header>

<div class="main" id="main-content"></div>

<div class="bottom-bar">
  <div class="bottom-inner">
    <button class="btn-export" id="exportBtn">📋 Сформировать заказ</button>
    <button class="btn-clear" id="clearBtn">🗑</button>
  </div>
  <div class="stats-bar" id="stats-bar">нет отмеченных позиций</div>
</div>

<script>
// ==================== STATE ====================
let state = {
  projects: {},
  currentProjectId: 'default',
  tech: 'ip',
  notes: '',
  openSections: {
    cameras: true, recording: true, storage: true,
    power: true, cabling: true, workstation: true,
    mounting: true, custom: true
  },
  sections: {
    cam:      { checked: false, qty: 1, spec: '4MP',   form: 'dome' },
    nvr:      { checked: false, qty: 1, spec: '8 кан.', nvrType: 'std' },
    xvr:      { checked: false, qty: 1, spec: '8 кан.' },
    hdd:      { checked: false, qty: 1, spec: '2TB' },
    poe:      { checked: false, qty: 1, spec: '8 портов' },
    psu:      { checked: false, qty: 1, spec: '10A' },
    bnc:      { checked: false, qty: 10 },
    box:      { checked: false, qty: 1 },
    rj45:     { checked: false, qty: 20 },
    utp:      { checked: false, qty: 100, env: 'in' },
    coax:     { checked: false, qty: 100, env: 'in' },
    gofra:    { checked: false, qty: 50,  dia: '20mm' },
    brackets: { checked: false, qty: 1,   btype: 'wall' },
    shelves:  { checked: false, qty: 1 },
    fasteners:{ checked: false, qty: 1 },
    monitor:  { checked: false, qty: 1,   spec: '24"' },
    mouse_ext:{ checked: false, qty: 1 },
    hdmi:     { checked: false, qty: 1,   spec: '3м' }
  },
  custom: []
};

// ==================== HELPERS ====================
function defaultSections() {
  return JSON.parse(JSON.stringify(state.sections));
}

function loadFromStorage() {
  const saved = localStorage.getItem('vp_pro_state');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed.projects) state.projects = parsed.projects;
      if (parsed.currentProjectId) state.currentProjectId = parsed.currentProjectId;
      if (!state.projects[state.currentProjectId]) {
        state.projects[state.currentProjectId] = {
          tech: 'ip',
          notes: '',
          sections: defaultSections(),
          custom: [],
          openSections: { cameras: true, recording: true, storage: true, power: true, cabling: true, workstation: true, mounting: true, custom: true }
        };
      }
      const cur = state.projects[state.currentProjectId];
      state.tech = cur.tech || 'ip';
      state.notes = cur.notes || '';
      state.sections = cur.sections || defaultSections();
      state.custom = cur.custom || [];
      state.openSections = cur.openSections || { cameras: true, recording: true, storage: true, power: true, cabling: true, workstation: true, mounting: true, custom: true };
    } catch(e) { console.warn(e); }
  } else {
    state.projects = {
      default: {
        tech: 'ip',
        notes: '',
        sections: defaultSections(),
        custom: [],
        openSections: { cameras: true, recording: true, storage: true, power: true, cabling: true, workstation: true, mounting: true, custom: true }
      }
    };
    state.currentProjectId = 'default';
    state.tech = 'ip';
    state.notes = '';
    state.sections = defaultSections();
    state.custom = [];
    state.openSections = { cameras: true, recording: true, storage: true, power: true, cabling: true, workstation: true, mounting: true, custom: true };
  }
}

function saveToStorage() {
  state.projects[state.currentProjectId] = {
    tech: state.tech,
    notes: state.notes,
    sections: state.sections,
    custom: state.custom,
    openSections: state.openSections
  };
  localStorage.setItem('vp_pro_state', JSON.stringify({
    projects: state.projects,
    currentProjectId: state.currentProjectId
  }));
}

function ss(id) { return state.sections[id]; }

function isCritical(id) {
  const camChecked = ss('cam').checked && ss('cam').qty > 0;
  if (!camChecked) return false;
  const criticals = ['nvr','xvr','hdd','poe','psu','monitor'];
  if (!criticals.includes(id)) return false;
  if (id === 'nvr' && state.tech !== 'ip') return false;
  if (id === 'xvr' && state.tech !== 'hdcvi') return false;
  if (id === 'poe' && state.tech !== 'ip') return false;
  if (id === 'psu' && state.tech !== 'hdcvi') return false;
  if (id === 'monitor') return ss('cam').qty >= 4 && !ss('monitor').checked;
  return !ss(id).checked;
}

function autoFixCriticals() {
  const camQty = ss('cam').qty;
  if (camQty === 0) return;
  if (state.tech === 'ip') {
    let ports = '8 портов';
    if (camQty <= 4) ports = '4 порта';
    else if (camQty <= 8) ports = '8 портов';
    else if (camQty <= 16) ports = '16 портов';
    else ports = '24 порта';
    ss('poe').spec = ports;
    if (!ss('poe').checked) ss('poe').checked = true;
  } else {
    let amps = '5A';
    if (camQty <= 4) amps = '5A';
    else if (camQty <= 8) amps = '10A';
    else amps = '20A';
    ss('psu').spec = amps;
    if (!ss('psu').checked) ss('psu').checked = true;
  }
  if (!ss('hdd').checked) ss('hdd').checked = true;
  saveToStorage();
  render();
  showToast('Автоподбор выполнен ✓', '#00e5a0');
}

function changeCameraQty(delta) {
  let newQty = ss('cam').qty + delta;
  if (newQty < 0) newQty = 0;
  ss('cam').qty = newQty;
  if (newQty > 0 && !ss('cam').checked) ss('cam').checked = true;
  if (state.tech === 'ip') {
    ss('rj45').qty = Math.max(ss('rj45').qty, newQty * 2);
  } else {
    ss('bnc').qty = Math.max(ss('bnc').qty, newQty * 2);
  }
  ss('box').qty = Math.max(ss('box').qty, newQty);
  autoFixCriticals();
  saveToStorage();
  render();
}

function applyTemplate(name) {
  if (name === 'apartment') {
    ss('cam').qty = 2; ss('cam').spec = '4MP'; ss('cam').checked = true;
    if (state.tech === 'ip') { ss('nvr').spec = '4 кан.'; ss('poe').spec = '4 порта'; }
    else { ss('xvr').spec = '4 кан.'; ss('psu').spec = '5A'; }
    ss('hdd').spec = '2TB'; ss('hdd').checked = true;
    ss('box').qty = 2; ss('utp').qty = 50; ss('coax').qty = 50; ss('gofra').qty = 30;
    ss('monitor').checked = true;
  } else if (name === 'office') {
    ss('cam').qty = 8; ss('cam').spec = '5MP'; ss('cam').checked = true;
    if (state.tech === 'ip') { ss('nvr').spec = '8 кан.'; ss('poe').spec = '8 портов'; }
    else { ss('xvr').spec = '8 кан.'; ss('psu').spec = '10A'; }
    ss('hdd').spec = '4TB'; ss('hdd').checked = true;
    ss('box').qty = 8; ss('utp').qty = 300; ss('coax').qty = 300; ss('gofra').qty = 200;
    ss('monitor').checked = true;
    ss('brackets').qty = 8; ss('fasteners').qty = 4;
  } else if (name === 'store') {
    ss('cam').qty = 16; ss('cam').spec = '8MP'; ss('cam').checked = true;
    if (state.tech === 'ip') { ss('nvr').spec = '16 кан.'; ss('poe').spec = '16 портов'; }
    else { ss('xvr').spec = '16 кан.'; ss('psu').spec = '20A'; }
    ss('hdd').spec = '6TB'; ss('hdd').checked = true;
    ss('box').qty = 16; ss('utp').qty = 500; ss('coax').qty = 500; ss('gofra').qty = 400;
    ss('monitor').checked = true;
    ss('brackets').qty = 16; ss('fasteners').qty = 8; ss('shelves').qty = 2;
  }
  autoFixCriticals();
  saveToStorage();
  render();
  showToast(`Шаблон "${name}" загружен`, '#00e5a0');
}

function showProjectDialog() {
  const modalDiv = document.getElementById('modal');
  let listHtml = '';
  for (let id in state.projects) {
    listHtml += `<button class="project-btn" style="display:block; width:100%; margin-bottom:8px; text-align:left; padding:8px;" onclick="switchToProject('${id.replace(/'/g, "\\'")}')">📁 ${escapeHtml(id)}</button>`;
  }
  modalDiv.innerHTML = `
    <div class="modal">
      <h3>📁 Управление объектами</h3>
      <p>Создайте новый объект или выберите существующий.</p>
      <div style="margin-bottom:12px;">
        <input type="text" id="newProjectName" class="project-input" placeholder="Название объекта (адрес)">
        <button id="createProjectBtn" class="btn-add" style="margin-top:8px;">➕ Создать</button>
      </div>
      <div id="projectList" style="margin-bottom:20px; max-height:200px; overflow-y:auto;">${listHtml}</div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Закрыть</button>
      </div>
    </div>
  `;
  modalDiv.style.display = 'flex';
  document.getElementById('createProjectBtn').onclick = () => {
    const name = document.getElementById('newProjectName').value.trim();
    if (!name) return;
    if (!state.projects[name]) {
      state.projects[name] = {
        tech: state.tech,
        notes: '',
        sections: defaultSections(),
        custom: [],
        openSections: state.openSections
      };
    }
    state.currentProjectId = name;
    switchToProject(name);
  };
}

function switchToProject(projId) {
  const proj = state.projects[projId];
  if (proj) {
    state.tech = proj.tech;
    state.notes = proj.notes || '';
    state.sections = proj.sections;
    state.custom = proj.custom || [];
    state.openSections = proj.openSections || state.openSections;
    state.currentProjectId = projId;
    saveToStorage();
    closeModal();
    render();
  }
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function confirmClear() {
  state.sections = defaultSections();
  state.custom = [];
  state.notes = '';
  autoFixCriticals();
  saveToStorage();
  closeModal();
  render();
}

function openClearModal() {
  const modalDiv = document.getElementById('modal');
  modalDiv.innerHTML = `
    <div class="modal">
      <h3>⚠ Очистить всё?</h3>
      <p>Все данные текущего объекта будут сброшены. Это действие нельзя отменить.</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
        <button class="btn-confirm-clear" onclick="confirmClear()">Очистить</button>
      </div>
    </div>
  `;
  modalDiv.style.display = 'flex';
}

// ==================== RENDER ====================
function render() {
  const main = document.getElementById('main-content');
  let html = `
    <div class="project-bar">
      <div class="project-name" onclick="showProjectDialog()">📁 ${escapeHtml(state.currentProjectId)}</div>
      <button class="project-btn" onclick="showProjectDialog()">Сменить</button>
    </div>
    <div class="quick-cam">
      <span>📷 Камеры:</span>
      <div class="cam-counter">
        <button onclick="changeCameraQty(-1)">-</button>
        <input type="number" id="camQtyInput" value="${ss('cam').qty}" min="0" step="1" onchange="ss('cam').qty=Math.max(0,parseInt(this.value)||0); autoFixCriticals(); saveToStorage(); render();">
        <button onclick="changeCameraQty(1)">+</button>
      </div>
    </div>
    <div class="notes-area">
      <textarea id="projectNotes" placeholder="Заметки по объекту (адрес, особенности монтажа, контакты)...">${escapeHtml(state.notes)}</textarea>
    </div>
    <div class="template-row">
      <button class="template-btn" onclick="applyTemplate('apartment')">🏠 Квартира</button>
      <button class="template-btn" onclick="applyTemplate('office')">🏢 Офис</button>
      <button class="template-btn" onclick="applyTemplate('store')">🏬 Магазин</button>
    </div>
  `;

  // Камеры (детальная настройка)
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('cameras')">
      <span class="section-icon">📷</span>
      <span class="section-title">Настройки камер</span>
      <span class="section-chevron ${state.openSections.cameras ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.cameras) {
    html += `<div class="item-row">
      <div class="item-row-main">
        ${checkboxHTML('cam')}
        <div class="item-info">
          <div class="item-name">Камера наблюдения</div>
          <div class="item-sub">Разрешение · Форм-фактор</div>
        </div>
        ${selectHTML('cam', 'spec', ['2MP','4MP','5MP','8MP'], '78px')}
        ${qtyHTML('cam')}
      </div>
      <div class="item-row-sub">
        <span class="sub-label">Форм-фактор:</span>
        ${pillHTML('cam', 'form', [{val:'dome',label:'Купол'},{val:'bullet',label:'Цилиндр'}])}
      </div>
    </div>`;
  }
  html += `</div>`;

  // Регистрация
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('recording')">
      <span class="section-icon">🖥</span>
      <span class="section-title">Регистрация</span>
      <span class="section-chevron ${state.openSections.recording ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.recording) {
    if (state.tech === 'ip') {
      html += itemRow('nvr', 'NVR', 'Каналы · Тип',
        selectHTML('nvr', 'spec', ['4 кан.','8 кан.','16 кан.','32 кан.'], '82px'),
        `<div class="item-row-sub"><span class="sub-label">Тип NVR:</span>${pillHTML('nvr', 'nvrType', [{val:'std',label:'Стандарт'},{val:'poe',label:'Встр. PoE'}])}</div>`
      );
    } else {
      html += itemRow('xvr', 'XVR', 'Количество каналов', selectHTML('xvr', 'spec', ['4 кан.','8 кан.','16 кан.','32 кан.'], '82px'), '');
    }
  }
  html += `</div>`;

  // Хранение
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('storage')">
      <span class="section-icon">💾</span>
      <span class="section-title">Хранение</span>
      <span class="section-chevron ${state.openSections.storage ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.storage) {
    html += itemRow('hdd', 'HDD жёсткий диск', 'Объём', selectHTML('hdd', 'spec', ['1TB','2TB','4TB','6TB'], '72px'), '');
  }
  html += `</div>`;

  // Питание
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('power')">
      <span class="section-icon">⚡</span>
      <span class="section-title">Питание и коммутация</span>
      <span class="section-chevron ${state.openSections.power ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.power) {
    if (state.tech === 'ip') {
      html += itemRow('poe', 'PoE-коммутатор', 'Количество портов', selectHTML('poe', 'spec', ['4 порта','8 портов','16 портов','24 порта'], '90px'), '');
    } else {
      html += itemRow('psu', 'Блок питания 12V DC', 'Суммарный ток', selectHTML('psu', 'spec', ['5A','10A','20A'], '64px'), '');
      html += itemRow('bnc', 'BNC-коннекторы', 'Компрессионные', '', '');
    }
  }
  html += `</div>`;

  // Кабельная часть
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('cabling')">
      <span class="section-icon">🔌</span>
      <span class="section-title">Кабельная часть</span>
      <span class="section-chevron ${state.openSections.cabling ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.cabling) {
    html += itemRow('box', 'Монтажные коробки', 'Подрозетники', '', '');
    if (state.tech === 'ip') {
      html += itemRow('rj45', 'Коннекторы RJ-45', 'Cat5e / Cat6', '', '');
      html += itemRow('utp', 'Кабель UTP', 'Метры · Среда', qtyHTML('utp'),
        `<div class="item-row-sub"><span class="sub-label">Среда:</span>${pillHTML('utp', 'env', [{val:'in',label:'Внутр.'},{val:'out',label:'Улица'}])}</div>`
      );
    } else {
      html += itemRow('coax', 'Кабель коаксиальный', 'RG-59 · Метры · Среда', qtyHTML('coax'),
        `<div class="item-row-sub"><span class="sub-label">Среда:</span>${pillHTML('coax', 'env', [{val:'in',label:'Внутр.'},{val:'out',label:'Улица'}])}</div>`
      );
    }
    html += itemRow('gofra', 'Гофра защитная', 'Диаметр · Метры',
      selectHTML('gofra', 'dia', ['16мм','20мм','25мм'], '66px') + qtyHTML('gofra'), ''
    );
    if (ss('gofra').checked) {
      html += `<div class="sub-item-row"><span>↳ Клипсы ${ss('gofra').dia} (автодобавлено)</span><span class="clips-tag">🔗 авто</span><span>${ss('gofra').qty} шт.</span></div>`;
    }
  }
  html += `</div>`;

  // Рабочее место
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('workstation')">
      <span class="section-icon">🖥</span>
      <span class="section-title">Рабочее место</span>
      <span class="section-chevron ${state.openSections.workstation ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.workstation) {
    html += itemRow('monitor', 'Монитор', 'Диагональ', selectHTML('monitor', 'spec', ['19"','22"','24"','27"'], '64px'), '');
    html += itemRow('mouse_ext', 'Удлинитель мыши', 'По USB / UTP', '', '');
    html += itemRow('hdmi', 'Кабель HDMI', 'Длина', selectHTML('hdmi', 'spec', ['1.5м','3м','5м','10м'], '64px'), '');
  }
  html += `</div>`;

  // Монтаж
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('mounting')">
      <span class="section-icon">🔧</span>
      <span class="section-title">Монтаж</span>
      <span class="section-chevron ${state.openSections.mounting ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.mounting) {
    html += itemRow('brackets', 'Кронштейны', 'Тип крепления', qtyHTML('brackets'),
      `<div class="item-row-sub"><span class="sub-label">Тип:</span>${pillHTML('brackets', 'btype', [{val:'wall',label:'Настенный'},{val:'pole',label:'На столб'},{val:'corner',label:'Угловой'}])}</div>`
    );
    html += itemRow('shelves', 'Полки под оборудование', 'Для шкафа / стойки', '', '');
    html += itemRow('fasteners', 'Дюбели и саморезы', 'Монтажный комплект', '', '');
  }
  html += `</div>`;

  // Дополнительно
  html += `<div class="section">
    <div class="section-header" onclick="toggleSec('custom')">
      <span class="section-icon">➕</span>
      <span class="section-title">Дополнительно</span>
      <span class="section-chevron ${state.openSections.custom ? 'open' : ''}">▼</span>
    </div>`;
  if (state.openSections.custom) {
    state.custom.forEach((item, idx) => {
      html += `<div class="item-row">
        <div class="item-row-main">
          <label class="check-wrap">
            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="chkCustom(${idx}, this.checked)">
            <div class="check-box"><span class="check-mark">✓</span></div>
          </label>
          <div class="item-info">
            <input type="text" class="custom-name-input" value="${escapeHtml(item.name)}" onchange="renameCustom(${idx}, this.value)">
          </div>
          <input type="number" class="qty-input" min="1" max="9999" value="${item.qty}" onchange="qtyCustom(${idx}, this.value)">
          <button class="btn-del" onclick="delCustom(${idx})">✕</button>
        </div>
      </div>`;
    });
    html += `<div class="add-custom"><div class="add-row"><input type="text" id="add-input" placeholder="Название позиции..."><button class="btn-add" onclick="addCustom()">+ Добавить</button></div></div>`;
  }
  html += `</div>`;

  main.innerHTML = html;
  document.getElementById('projectNotes').addEventListener('input', (e) => {
    state.notes = e.target.value;
    saveToStorage();
  });
  updateStats();
}

function itemRow(id, name, sub, extraControls = '', extraSub = '') {
  const warn = isCritical(id);
  return `<div class="item-row ${warn ? 'warning' : ''}">
    <div class="item-row-main">
      ${checkboxHTML(id)}
      <div class="item-info">
        <div class="item-name">${escapeHtml(name)}</div>
        <div class="item-sub">${escapeHtml(sub)}</div>
      </div>
      ${extraControls}
      ${qtyHTML(id)}
      ${warn ? '<span class="warn-badge" onclick="autoFixCriticals()">⚠️</span>' : ''}
    </div>
    ${extraSub}
  </div>`;
}

function checkboxHTML(id) {
  return `<label class="check-wrap">
    <input type="checkbox" ${ss(id).checked ? 'checked' : ''} onchange="chkItem('${id}', this.checked)">
    <div class="check-box"><span class="check-mark">✓</span></div>
  </label>`;
}

function selectHTML(id, field, opts, width) {
  const cur = ss(id)[field];
  let h = `<select class="spec-select" style="width:${width||'auto'}" onchange="setField('${id}','${field}',this.value)">`;
  opts.forEach(o => h += `<option value="${o}" ${cur===o ? 'selected' : ''}>${o}</option>`);
  h += `</select>`;
  return h;
}

function pillHTML(id, field, opts) {
  const cur = ss(id)[field];
  let h = `<div class="pill-toggle">`;
  opts.forEach(o => h += `<button class="pill-btn ${cur===o.val ? 'active' : ''}" onclick="setField('${id}','${field}','${o.val}')">${o.label}</button>`);
  h += `</div>`;
  return h;
}

function qtyHTML(id) {
  // Используем onchange вместо oninput — клавиатура не пропадает при вводе
  return `<input type="number" class="qty-input" min="1" max="9999" value="${ss(id).qty}" onchange="setQty('${id}', this.value)">`;
}

function chkItem(id, v) { ss(id).checked = v; saveToStorage(); render(); }
function setField(id, field, val) { ss(id)[field] = val; saveToStorage(); render(); }
function setQty(id, v) { ss(id).qty = Math.max(1, parseInt(v)||1); saveToStorage(); render(); }
function toggleSec(key) { state.openSections[key] = !state.openSections[key]; saveToStorage(); render(); }

function addCustom() {
  const inp = document.getElementById('add-input');
  const name = inp.value.trim();
  if (!name) return;
  state.custom.push({ name, qty: 1, checked: true });
  saveToStorage();
  render();
}
function delCustom(idx) { state.custom.splice(idx,1); saveToStorage(); render(); }
function chkCustom(idx, v) { state.custom[idx].checked = v; saveToStorage(); updateStats(); }
function renameCustom(idx, v) { state.custom[idx].name = v; saveToStorage(); }
function qtyCustom(idx, v) { state.custom[idx].qty = Math.max(1, parseInt(v)||1); saveToStorage(); render(); }

function getCheckedItems() {
  const result = [];
  const s = state.sections;
  function push(name, qty, unit='шт.') { if (qty > 0) result.push({ name, qty, unit }); }

  if (s.cam.checked && s.cam.qty > 0) push(`Камера ${s.cam.spec} (${s.cam.form==='dome'?'Купол':'Цилиндр'})`, s.cam.qty);
  if (state.tech === 'ip' && s.nvr.checked) push(`NVR ${s.nvr.spec}${s.nvr.nvrType==='poe'?', Встр. PoE':''}`, s.nvr.qty);
  if (state.tech === 'hdcvi' && s.xvr.checked) push(`XVR ${s.xvr.spec}`, s.xvr.qty);
  if (s.hdd.checked) push(`HDD ${s.hdd.spec}`, s.hdd.qty);
  if (state.tech === 'ip' && s.poe.checked) push(`PoE-коммутатор ${s.poe.spec}`, s.poe.qty);
  if (state.tech === 'hdcvi' && s.psu.checked) push(`Блок питания 12V ${s.psu.spec}`, s.psu.qty);
  if (state.tech === 'hdcvi' && s.bnc.checked) push('BNC-коннекторы компрессионные', s.bnc.qty);
  if (s.box.checked) push('Монтажные коробки', s.box.qty);
  if (state.tech === 'ip' && s.rj45.checked) push('Коннекторы RJ-45', s.rj45.qty);
  if (state.tech === 'ip' && s.utp.checked) push(`Кабель UTP${s.utp.env==='out'?', уличный':', внутренний'}`, s.utp.qty, 'м');
  if (state.tech === 'hdcvi' && s.coax.checked) push(`Кабель коаксиальный${s.coax.env==='out'?', уличный':', внутренний'}`, s.coax.qty, 'м');
  if (s.gofra.checked) {
    push(`Гофра ${s.gofra.dia}`, s.gofra.qty, 'м');
    push(`Клипсы ${s.gofra.dia}`, s.gofra.qty);
  }
  if (s.monitor.checked) push(`Монитор ${s.monitor.spec}`, s.monitor.qty);
  if (s.mouse_ext.checked) push('Удлинитель мыши (USB/UTP)', s.mouse_ext.qty);
  if (s.hdmi.checked) push(`Кабель HDMI ${s.hdmi.spec}`, s.hdmi.qty);
  const btypeMap = { wall:'настенный', pole:'на столб', corner:'угловой' };
  if (s.brackets.checked) push(`Кронштейн ${btypeMap[s.brackets.btype]||''}`, s.brackets.qty);
  if (s.shelves.checked) push('Полки под оборудование', s.shelves.qty);
  if (s.fasteners.checked) push('Дюбели и саморезы', s.fasteners.qty, 'компл.');
  state.custom.forEach(item => { if (item.checked) push(item.name, item.qty); });
  return result;
}

function exportOrder() {
  const items = getCheckedItems();
  if (!items.length) { showToast('⚠ Нет отмеченных позиций', '#ff6b35'); return; }
  const techLabel = state.tech.toUpperCase();
  const date = new Date().toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  const time = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
  let txt = `📋 *ЗАЯВКА НА ОБОРУДОВАНИЕ*\n━━━━━━━━━━━━━━━━━━━━━━\n🔧 Технология: *${techLabel}*\n📅 ${date}  ${time}\n🏷 Объект: *${state.currentProjectId}*\n`;
  if (state.notes.trim()) txt += `📝 *Заметки:* ${state.notes}\n`;
  txt += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;
  items.forEach((it, i) => { txt += `${i+1}. ${it.name} — *${it.qty} ${it.unit}*\n`; });
  txt += `\n━━━━━━━━━━━━━━━━━━━━━━\n📦 Итого позиций: ${items.length}\n_VisionProtect_`;
  if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => showToast('✓ Заказ скопирован!')).catch(() => fallbackCopy(txt));
  else fallbackCopy(txt);
}

function fallbackCopy(txt) {
  const ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  showToast('✓ Заказ скопирован!');
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || 'var(--success)';
  t.style.color = color ? '#fff' : '#000';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateStats() {
  const items = getCheckedItems();
  const bar = document.getElementById('stats-bar');
  bar.textContent = items.length ? `${items.length} поз. отмечено · готово к отправке` : 'нет отмеченных позиций';
}

function setTech(t) {
  state.tech = t;
  autoFixCriticals();
  saveToStorage();
  render();
  document.getElementById('btn-ip').classList.toggle('active', t==='ip');
  document.getElementById('btn-hdcvi').classList.toggle('active', t==='hdcvi');
}

function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// ==================== INIT ====================
loadFromStorage();
document.getElementById('btn-ip').classList.toggle('active', state.tech==='ip');
document.getElementById('btn-hdcvi').classList.toggle('active', state.tech==='hdcvi');
document.getElementById('exportBtn').onclick = exportOrder;
document.getElementById('clearBtn').onclick = openClearModal;
window.setTech = setTech;
window.changeCameraQty = changeCameraQty;
window.autoFixCriticals = autoFixCriticals;
window.applyTemplate = applyTemplate;
window.showProjectDialog = showProjectDialog;
window.closeModal = closeModal;
window.confirmClear = confirmClear;
window.switchToProject = switchToProject;
window.chkItem = chkItem;
window.setField = setField;
window.setQty = setQty;
window.toggleSec = toggleSec;
window.addCustom = addCustom;
window.delCustom = delCustom;
window.chkCustom = chkCustom;
window.renameCustom = renameCustom;
window.qtyCustom = qtyCustom;
render();
</script>
</body>
</html>
